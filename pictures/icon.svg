<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80"
     image-rendering="pixelated" shape-rendering="crispEdges">
  <defs>

    <!-- Phosphor bloom blur -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>
    <!-- Softer glow for rook icon -->
    <filter id="rook-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>

    <!-- Scanlines: 1px dark band every 4px -->
    <pattern id="scanlines" x="0" y="0" width="80" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="80" height="3" fill="transparent"/>
      <rect x="0" y="3" width="80" height="1" fill="rgba(0,0,0,0.20)"/>
    </pattern>

    <!-- Pixel grid: faint 3×3 cell lines -->
    <pattern id="pixelgrid" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <path d="M3,0 L0,0 0,3" stroke="rgba(0,0,0,0.09)" stroke-width="0.5" fill="none"/>
    </pattern>

    <!-- Vignette: darkens edges -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="50%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.70)"/>
    </radialGradient>

    <!-- CRT flicker animation -->
    <style>
      @keyframes flicker {
        0%,6%,100% { opacity:1; }
        3%          { opacity:0.96; }
        50%         { opacity:0.98; }
        53%         { opacity:1; }
      }
      #crt { animation: flicker 6s infinite; }
    </style>

  </defs>

  <!-- ── Dark tile background ── -->
  <rect width="80" height="80" fill="#090d1a"/>

  <!-- ── Tile border bloom ── -->
  <rect x="3" y="3" width="74" height="74" fill="none"
        stroke="#00ebeb" stroke-width="9" opacity="0.28" filter="url(#glow)"/>
  <!-- Tile border crisp line -->
  <rect x="3" y="3" width="74" height="74" fill="none"
        stroke="#00ebeb" stroke-width="2"/>

  <!-- ── Circle bloom ── -->
  <circle cx="40" cy="40" r="27" fill="none"
          stroke="#00ebeb" stroke-width="8" opacity="0.28" filter="url(#glow)"/>
  <!-- Circle crisp -->
  <circle cx="40" cy="40" r="27" fill="#06080f" stroke="#00ebeb" stroke-width="2.5"/>

  <!-- ── Unicode rook ♜ (U+265C), serif, centered in circle ── -->
  <!-- Rook bloom -->
  <text x="40" y="54" text-anchor="middle" font-family="serif" font-size="42"
        fill="#00ebeb" opacity="0.35" filter="url(#rook-glow)"
        style="-webkit-font-smoothing:none;font-smooth:never;">&#x265C;</text>
  <!-- Rook crisp -->
  <text x="40" y="54" text-anchor="middle" font-family="serif" font-size="42"
        fill="#00ebeb"
        style="-webkit-font-smoothing:none;font-smooth:never;">&#x265C;</text>

  <!-- ── CRT overlay (scanlines + pixel grid + vignette + chromatic aberration) ── -->
  <g id="crt">
    <rect width="80" height="80" fill="url(#scanlines)"/>
    <rect width="80" height="80" fill="url(#pixelgrid)"/>
    <rect width="80" height="80" fill="url(#vignette)"/>
    <!-- Chromatic aberration: red fringe left, blue fringe right -->
    <rect x="3" y="3" width="74" height="74" fill="none"
          stroke="rgba(255,0,60,0.07)" stroke-width="2.5"
          transform="translate(-1,0)"/>
    <rect x="3" y="3" width="74" height="74" fill="none"
          stroke="rgba(0,60,255,0.07)" stroke-width="2.5"
          transform="translate(1,0)"/>
  </g>

</svg>
